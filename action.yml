name: 'Build with La Famille'
description: 'Builds a static site using the La Famille generator'
author: 'Jules'
branding:
  icon: 'layout'
  color: 'blue'
inputs:
  content-dir:
    description: 'Directory containing markdown files'
    required: false
    default: 'content'
  output-dir:
    description: 'Directory for generated static site'
    required: false
    default: 'public'
  template:
    description: 'Path to HTML layout template'
    required: false
    default: 'templates/layout.html'
  site-url:
    description: 'Public base URL of the generated site'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Setup Go
      uses: actions/setup-go@v7
      with:
        go-version: 'stable'

    - name: Build static site
      shell: bash
      env:
        INPUT_CONTENT_DIR: ${{ inputs.content-dir }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_TEMPLATE: ${{ inputs.template }}
        INPUT_SITE_URL: ${{ inputs.site-url }}
      run: |
        ARGS=("-c" "$INPUT_CONTENT_DIR" "-o" "$INPUT_OUTPUT_DIR")
        if [ -n "$INPUT_TEMPLATE" ]; then
          ARGS+=("-t" "$INPUT_TEMPLATE")
        fi
        if [ -n "$INPUT_SITE_URL" ]; then
          ARGS+=("--site-url" "$INPUT_SITE_URL")
        fi
        # Build from the action's own checkout. The module is declared as
        # github.com/tbuddy/la-famille, so it cannot be fetched through the
        # module proxy under the repository path this action is published at.
        # go build takes -o literally, so the .exe suffix Windows needs has to
        # be supplied here; the action declares no OS restriction.
        BIN="${RUNNER_TEMP:-/tmp}/la-famille"
        if [ "${RUNNER_OS:-}" = "Windows" ]; then
          BIN="${BIN}.exe"
        fi
        (cd "$GITHUB_ACTION_PATH" && go build -o "$BIN" ./cmd/la-famille)
        "$BIN" build "${ARGS[@]}"
