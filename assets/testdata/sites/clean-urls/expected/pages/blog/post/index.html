<!DOCTYPE html>
<html lang="en" data-theme="retro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog Post - La Famille</title>
    <meta name="description" content="">
    <meta property="og:title" content="My Blog Post">
    <meta property="og:description" content="">
    <meta property="og:image" content="">
    <meta property="og:type" content="website">
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="min-h-screen bg-base-200">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:p-4 focus:bg-base-100 focus:text-base-content focus-visible:ring-2 focus-visible:ring-primary focus-visible:outline-none">Skip to content</a>

    <nav aria-label="Main Navigation" class="navbar bg-base-100 shadow-sm mb-8">
        <div class="flex-1">
            <a class="btn btn-ghost text-xl focus-visible:ring-2 focus-visible:ring-primary focus-visible:outline-none" href="/">La Famille</a>
        </div>
        <div class="relative max-w-xs w-full">
            <form action="#" method="get" class="m-0" onsubmit="event.preventDefault();">
                <label for="site-search" class="sr-only">Search site</label>
                <input type="search" id="site-search" placeholder="Type / to search..."
                       class="input input-bordered w-full pr-10 focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary"
                       autocomplete="off" aria-autocomplete="list" aria-controls="search-results-list" />
            </form>
            <ul id="search-results-list" role="listbox" aria-label="Search results"
                class="absolute z-50 left-0 right-0 mt-2 max-h-60 overflow-y-auto hidden bg-base-200 border border-base-300 rounded-box shadow-xl p-2 text-sm space-y-1">
            </ul>
        </div>
    </nav>

    <main id="main-content" class="container mx-auto px-4 max-w-4xl">
        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">
                <h1 class="card-title text-4xl mb-2">My Blog Post</h1>
                

                <article class="prose prose-lg max-w-none prose-a:text-primary prose-a:hover:text-secondary prose-a:focus-visible:outline prose-a:focus-visible:outline-2 prose-a:focus-visible:outline-primary">
                    <p>A post. See <a href="../../my-post/" rel="nofollow">about</a>.</p>

                </article>
            </div>
        </div>
    </main>

    <footer class="footer footer-center p-4 bg-base-300 text-base-content mt-12">
        <aside>
            <p>Built in Go and Jules by Google, with Raoul(s) and DaisyUI</p>
        </aside>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const searchInput = document.getElementById("site-search");
            const resultsContainer = document.getElementById("search-results-list");
            let metaData = null;
            let fetchPromise = null;

            const fetchMetaData = () => {
                if (!fetchPromise) {
                    fetchPromise = fetch("/meta.json")
                        .then(response => {
                            if (!response.ok) throw new Error("Network response was not ok");
                            return response.json();
                        })
                        .then(data => {
                            metaData = data;
                            return data;
                        })
                        .catch(e => {
                            console.error("Failed to fetch search metadata:", e);
                            fetchPromise = null;
                        });
                }
                return fetchPromise;
            };

            searchInput.addEventListener("focus", fetchMetaData);

            searchInput.addEventListener("input", async (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (!query) {
                    resultsContainer.classList.add("hidden");
                    resultsContainer.innerHTML = "";
                    return;
                }

                await fetchMetaData();

                if (!metaData) return;

                const results = Object.entries(metaData).filter(([id, meta]) => {
                    const title = (meta.title || "").toLowerCase();
                    return id.toLowerCase().includes(query) || title.includes(query);
                });

                resultsContainer.innerHTML = "";
                if (results.length === 0) {
                    const li = document.createElement("li");
                    li.className = "p-4 text-sm text-base-content/70";
                    li.textContent = "No results found.";
                    resultsContainer.appendChild(li);
                    resultsContainer.classList.remove("hidden");
                    return;
                }

                results.forEach(([id, meta]) => {
                    const title = meta.title || id;
                    const li = document.createElement("li");
                    const a = document.createElement("a");
                    a.href = encodeURI(`/${id}.html`);
                    a.className = "block p-4 hover:bg-base-200 text-sm focus-visible:bg-base-200 focus-visible:outline-none";
                    a.textContent = title;
                    li.appendChild(a);
                    resultsContainer.appendChild(li);
                });
                resultsContainer.classList.remove("hidden");
            });

            document.addEventListener("click", (e) => {
                if (!searchInput.contains(e.target) && !resultsContainer.contains(e.target)) {
                    resultsContainer.classList.add("hidden");
                }
            });
        });
    </script>
</body>
</html>
