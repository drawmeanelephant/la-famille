<!DOCTYPE html>
<html lang="en" data-theme="retro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index.md - La Famille</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="min-h-screen bg-base-200">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:p-4 focus:bg-base-100 focus:text-base-content focus-visible:ring-2 focus-visible:ring-primary focus-visible:outline-none">Skip to content</a>

    <nav aria-label="Main Navigation" class="navbar bg-base-100 shadow-sm mb-8">
        <div class="flex-1">
            <a class="btn btn-ghost text-xl focus-visible:ring-2 focus-visible:ring-primary focus-visible:outline-none" href="/">La Famille</a>
        </div>
        <div class="flex-none relative">
            <form action="#" method="get" onsubmit="return false;" class="m-0">
                <input type="search" id="site-search" aria-label="Search site content" autocomplete="off" placeholder="Search..." class="input input-bordered input-sm w-full max-w-xs focus-visible:ring-2 focus-visible:ring-primary focus-visible:outline-none" />
            </form>
            <ul id="search-results" class="absolute top-full right-0 mt-2 w-64 bg-base-100 shadow-lg rounded-box z-50 hidden max-h-96 overflow-y-auto border border-base-200">
            </ul>
        </div>
    </nav>

    <main id="main-content" class="container mx-auto px-4 max-w-4xl">
        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">
                <h1 class="card-title text-4xl mb-2">index.md</h1>
                

                <article class="prose prose-lg max-w-none prose-a:text-primary prose-a:hover:text-secondary prose-a:focus-visible:outline prose-a:focus-visible:outline-2 prose-a:focus-visible:outline-primary">
                    <h1>Index</h1>
<p><a href="about.html" rel="nofollow">About</a>
<a href="blog/post.html" rel="nofollow">Post</a></p>

                </article>
            </div>
        </div>
    </main>


<footer class="footer footer-center p-4 bg-base-300 text-base-content mt-12">
    <aside>
        <p>Built in Go and Jules by Google, with Raoul(s) and DaisyUI</p>
    </aside>
</footer>


    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const searchInput = document.getElementById("site-search");
            const resultsContainer = document.getElementById("search-results");
            let metaData = null;
            let fetchPromise = null;

            const fetchMetaData = () => {
                if (!fetchPromise) {
                    fetchPromise = fetch("/meta.json")
                        .then(response => {
                            if (!response.ok) throw new Error("Network response was not ok");
                            return response.json();
                        })
                        .then(data => {
                            metaData = data;
                            return data;
                        })
                        .catch(e => {
                            console.error("Failed to fetch search metadata:", e);
                            fetchPromise = null;
                        });
                }
                return fetchPromise;
            };

            searchInput.addEventListener("focus", fetchMetaData);

            searchInput.addEventListener("input", async (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (!query) {
                    resultsContainer.classList.add("hidden");
                    resultsContainer.innerHTML = "";
                    return;
                }

                await fetchMetaData();

                if (!metaData) return;

                const results = Object.entries(metaData).filter(([id, meta]) => {
                    const title = (meta.title || "").toLowerCase();
                    return id.toLowerCase().includes(query) || title.includes(query);
                });

                resultsContainer.innerHTML = "";
                if (results.length === 0) {
                    const li = document.createElement("li");
                    li.className = "p-4 text-sm text-base-content/70";
                    li.textContent = "No results found.";
                    resultsContainer.appendChild(li);
                    resultsContainer.classList.remove("hidden");
                    return;
                }

                results.forEach(([id, meta]) => {
                    const title = meta.title || id;
                    const li = document.createElement("li");
                    const a = document.createElement("a");
                    a.href = encodeURI(`/${id}.html`);
                    a.className = "block p-4 hover:bg-base-200 text-sm focus-visible:bg-base-200 focus-visible:outline-none";
                    a.textContent = title;
                    li.appendChild(a);
                    resultsContainer.appendChild(li);
                });
                resultsContainer.classList.remove("hidden");
            });

            document.addEventListener("click", (e) => {
                if (!searchInput.contains(e.target) && !resultsContainer.contains(e.target)) {
                    resultsContainer.classList.add("hidden");
                }
            });
        });
    </script>
</body>
</html>
