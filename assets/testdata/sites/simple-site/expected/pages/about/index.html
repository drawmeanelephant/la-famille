<!DOCTYPE html>
<html lang="en" data-theme="retro">
<head>

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

<body class="min-h-screen bg-base-200">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:p-4 focus:bg-base-100 focus:text-base-content focus-visible:ring-2 focus-visible:ring-primary focus-visible:outline-none">Skip to content</a>

            </ul>
        </div>

                <h1 class="card-title text-4xl mb-2">About</h1>

                    <p>This is about.</p>

            </div>
        </div>

    <footer class="footer footer-center p-4 bg-base-300 text-base-content mt-12">
        <aside>
            <p>Built in Go and Jules by Google, with Raoul(s) and DaisyUI</p>
