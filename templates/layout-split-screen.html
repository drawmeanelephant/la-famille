<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - {{.Site.SiteName}}</title>
    <!-- DaisyUI CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- Tailwind CSS with Typography plugin via CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="min-h-screen bg-base-100 flex flex-col">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:p-4 focus:bg-base-100 focus:text-base-content focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary">Skip to content</a>

    <div class="flex-grow flex flex-col lg:flex-row">
        <!-- Left Sidebar / Branding (Mascot) -->
        <aside class="w-full lg:w-1/3 bg-primary text-primary-content flex flex-col justify-center items-center p-8 lg:min-h-screen relative shadow-lg z-10">
            <nav aria-label="Main Navigation" class="w-full text-left mb-8 lg:absolute lg:top-8 lg:left-8">
                <a class="btn btn-ghost text-xl hover:bg-primary/80 focus-visible:bg-primary/80 focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary" href="/">{{.Site.SiteName}}</a>
            </nav>
            <div class="text-center mt-12 lg:mt-0">
                <img src="/assets/img/mascot-brown-bag.jpeg" alt="Mascot Crest" class="w-48 h-48 rounded-full shadow-xl mx-auto mb-6 border-4 border-primary-content object-cover">
                <h2 class="text-3xl font-bold mb-2">{{.Site.SiteName}}</h2>
            </div>
        </aside>

        <!-- Right Content Area -->
        <main id="main-content" class="w-full lg:w-2/3 flex flex-col">
            <div class="flex-grow p-8 lg:p-16 max-w-4xl mx-auto w-full">
                <header class="mb-8 border-b border-base-300 pb-8 flex justify-between items-start">
                    <div>
                        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-base-content">{{.Title}}</h1>
                        {{if or .Author .Date}}
                        <div class="flex flex-wrap gap-4 text-sm text-base-content/70">
                            {{if .Author}}<span class="flex items-center"><svg class="w-4 h-4 mr-1" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg> {{.Author}}</span>{{end}}
                            {{if .Date}}<span class="flex items-center"><svg class="w-4 h-4 mr-1" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> {{.Date}}</span>{{end}}
                        </div>
                        {{end}}
                    </div>
                    <div class="tooltip tooltip-left" data-tip="Open Navigation">
                        <a href="/" class="btn btn-square btn-ghost focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary">
                            <img src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f419/u1f419_u1f354.png" aria-hidden="true" focusable="false" class="w-8 h-8" alt="Menu" />
                        </a>
                    </div>
                </header>

                <article class="prose prose-lg md:prose-xl max-w-none text-base-content prose-a:text-primary prose-a:hover:text-secondary prose-a:focus-visible:outline prose-a:focus-visible:outline-2 prose-a:focus-visible:outline-primary">
                    {{.Content}}
                </article>
            </div>

            <footer class="footer footer-center p-6 bg-base-200 text-base-content mt-auto border-t border-base-300">
                <aside>
                    <p>Built in Go and Jules by Google, with Raoul(s) and DaisyUI</p>
                </aside>
            </footer>
        </main>
    </div>
</body>
</html>
