{{define "footer-hacker"}}
<footer class="w-full py-stack-md px-margin flex flex-col md:flex-row justify-between items-center gap-stack-sm docked full-width bottom-0 border-t-2 border-dashed border-secondary-fixed-dim bg-surface-container-lowest dark:bg-surface-container-lowest flat no shadows">
<div class="font-label-sm text-label-sm tracking-widest text-secondary-fixed-dim dark:text-secondary-fixed-dim animate-pulse flex flex-col items-start md:items-center">
<pre class="text-tertiary text-[10px] leading-tight mb-2 font-mono">   .---.
  /     \
  |() ()|
  \  _  /
   `---'
 /|_|_|_|\
            </pre>
<span>system.status = UNTAMED // built by jules on go</span>
</div>
<nav class="flex gap-gutter font-label-sm text-label-sm tracking-widest">
{{if .Site.SiteLinks}}
    {{range .Site.SiteLinks}}
        <a href="{{.URL}}" class="hover:text-primary transition-colors focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary">{{.Label}}</a>
    {{end}}
{{end}}
</nav>
</footer>
{{end}}
