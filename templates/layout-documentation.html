<!DOCTYPE html>
<html lang="en" data-theme="winter">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - {{.Site.SiteName}}</title>
    <meta name="description" content="{{.Description}}">
    <meta property="og:title" content="{{.Title}}">
    <meta property="og:description" content="{{.Description}}">
    <meta property="og:image" content="{{.Image}}">
    <meta property="og:type" content="website">
    <!-- DaisyUI CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- Tailwind CSS with Typography plugin via CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    {{if .CanonicalURL}}<link rel="canonical" href="{{.CanonicalURL}}">
    <meta property="og:url" content="{{.CanonicalURL}}">{{end}}
</head>
<body class="min-h-screen bg-base-200 flex flex-col">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:p-4 focus:bg-base-100 focus:text-base-content focus-visible:ring-2 focus-visible:ring-primary focus-visible:outline-none">Skip to content</a>

    <header class="navbar bg-base-100 shadow-sm sticky top-0 z-40 w-full flex-none">
        <div class="flex-1">
            <a class="btn btn-ghost text-xl focus-visible:ring-2 focus-visible:ring-primary focus-visible:outline-none" href="/">{{.Site.SiteName}}</a>
        </div>
        <div class="flex-none hidden lg:block">
            <ul class="menu menu-horizontal px-1">
                <li><a class="focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary" href="/">Home</a></li>
            </ul>
        </div>
        <div class="flex-none lg:hidden">
            <label for="my-drawer-2" tabindex="0" class="btn btn-square btn-ghost drawer-button focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary" onkeydown="if(event.key === 'Enter' || event.key === ' ') { event.preventDefault(); document.getElementById('my-drawer-2').click(); }">
                <img src="https://www.gstatic.com/android/keyboard/emojikitchen/20241021/u1f419/u1f419_u1f354.png" aria-hidden="true" focusable="false" class="w-8 h-8" />
            </label>
        </div>
    </header>

    <div class="drawer lg:drawer-open flex-grow">
        <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />

        <div class="drawer-content flex flex-col items-center justify-start p-4 lg:p-8">
            <main id="main-content" class="w-full max-w-4xl bg-base-100 shadow-xl rounded-box p-6 lg:p-10">
                {{if or .Author .Date}}
                <div class="text-sm text-base-content/70 mb-8 border-b border-base-300 pb-4">
                    {{if .Author}}<span class="mr-4"><strong>By:</strong> {{.Author}}</span>{{end}}
                    {{if .Date}}<span><strong>Date:</strong> {{.Date}}</span>{{end}}
                </div>
                {{end}}

                <article class="prose prose-lg max-w-none prose-a:text-primary prose-a:hover:text-secondary prose-a:focus-visible:outline prose-a:focus-visible:outline-2 prose-a:focus-visible:outline-primary">
                    {{.Content}}
                </article>
            </main>

            <footer class="footer footer-center p-4 text-base-content/60 mt-12 w-full max-w-4xl">
                <aside>
                    <p>Built in Go and Jules by Google, with Raoul(s) and DaisyUI</p>
                </aside>
            </footer>
        </div>

        <div class="drawer-side h-full z-30">
            <label for="my-drawer-2" aria-label="close sidebar" class="drawer-overlay"></label>
            <ul class="menu p-4 w-80 min-h-full bg-base-200 text-base-content pt-4 border-r border-base-300">
                <!-- Sidebar content -->
                <li class="menu-title"><span>Navigation</span></li>
                <li><a class="focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary" href="/">Home</a></li>
                <li><a class="focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary" href="/jules/">Jules Content</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
