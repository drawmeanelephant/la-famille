<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - {{.Site.SiteName}}</title>
    <!-- DaisyUI CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- Tailwind CSS with Typography plugin via CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <style>
        /* Vanilla CSS for overrides */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #000;
            color: white;
            padding: 8px;
            z-index: 100;
        }
        .skip-link:focus {
            top: 0;
        }
    </style>
</head>
<body class="min-h-screen bg-base-100 flex flex-col items-center text-center font-sans antialiased text-base-content selection:bg-primary selection:text-primary-content">
    <a href="#main-content" class="skip-link sr-only focus:not-sr-only focus:absolute focus:p-4 focus:bg-base-300 focus:text-base-content focus:z-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-primary">Skip to content</a>

    <!-- Minimal Centered Header -->
    <header class="w-full max-w-3xl pt-16 pb-12 px-6">
        <a href="/" class="inline-block text-3xl font-light tracking-widest text-primary hover:text-primary-content hover:bg-primary px-4 py-2 rounded transition-colors focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-primary">
            {{.Site.SiteName}}
        </a>
    </header>

    <!-- Main Content Container -->
    <main id="main-content" class="flex-grow w-full max-w-3xl px-6 pb-20">

        <!-- Article Header -->
        <header class="mb-12">
            <h1 class="text-4xl md:text-5xl font-medium mb-6 text-base-content">{{.Title}}</h1>

            {{if or .Author .Date}}
            <div class="flex flex-col sm:flex-row justify-center items-center gap-2 sm:gap-6 text-sm text-base-content/60 uppercase tracking-wide">
                {{if .Author}}
                <span class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true" focusable="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    {{.Author}}
                </span>
                {{end}}

                {{if and .Author .Date}}<span class="hidden sm:inline" aria-hidden="true">&bull;</span>{{end}}

                {{if .Date}}
                <span class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true" focusable="false"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    {{.Date}}
                </span>
                {{end}}
            </div>
            {{end}}
        </header>

        <!-- Prose Content -->
        <article class="prose prose-lg md:prose-xl mx-auto text-left prose-a:text-primary prose-a:hover:text-primary prose-a:focus-visible:outline prose-a:focus-visible:outline-2 prose-a:focus-visible:outline-offset-2 prose-a:focus-visible:outline-primary prose-img:rounded-xl prose-img:shadow-lg">
            {{.Content}}
        </article>
    </main>

    <!-- Minimal Footer -->
    <footer class="w-full bg-base-200 mt-auto border-t border-base-300 py-12 px-6 flex flex-col items-center">
        <!-- Mascot -->
        <div class="mb-6 avatar relative group">
            <div class="w-24 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2 overflow-hidden bg-white group-hover:scale-105 transition-transform duration-300">
                <img src="/assets/img/jules-logo.png" alt="Raoul(s) the Octopus Mascot" class="object-cover" />
            </div>
        </div>

        <p class="text-base-content/80 font-medium mb-2">Built in Go and Jules by Google, with Raoul(s) and DaisyUI</p>
        <p class="text-sm text-base-content/60">Generated by {{.Site.SiteName}}</p>
    </footer>

</body>
</html>
